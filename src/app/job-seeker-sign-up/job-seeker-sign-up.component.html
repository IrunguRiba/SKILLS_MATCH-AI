
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

<div class="header">
  <h3>Sign Up with</h3>
  <button type="button" class="googleBtn">
    Google
    <i class="fa-brands fa-google fa-beat-fade"></i>
  </button>
  <button type="button" class="linkedInBtn">
    Linked In
    <i class="fab fa-linkedin fa-beat-fade"></i>
  </button>
</div>

<div class="or-separator">
<hr />
<span>OR</span>
<hr />
</div>

<h3 class="signup-header">SIGN UP HERE</h3>
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="signup-form">
<form [formGroup]="form" (ngSubmit)="onSubmit()" style=" margin-left: 400px; margin-bottom: 20px;">
  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" class="form-control" formControlName="email" placeholder="Email">
    <div class="text-danger" *ngIf="form.controls['email'].touched && form.controls['email'].invalid"> 
      <span *ngIf="form.controls['email'].errors?.['required']">Email is required.</span>
      <span *ngIf="form.controls['email'].errors?.['email']">Please enter a valid email.</span>
    </div>
  </div>
  <div class="form-row two-cols">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" class="form-control" formControlName="firstName" placeholder="First Name">
      <div class="text-danger" *ngIf="form.controls['firstName'].touched && form.controls['firstName'].invalid"> 
        First Name is required.
      </div>
    </div>
    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" class="form-control" formControlName="lastName" placeholder="Last Name">
      <div class="text-danger" *ngIf="form.controls['lastName'].touched && form.controls['lastName'].invalid">
        <span *ngIf="form.controls['lastName'].errors?.['required']">Last Name is required.</span>
        <span *ngIf="form.controls['lastName'].errors?.['minlength']">Last Name must be at least 1 character long.</span>
      </div>
    </div>
  </div>

  <!-- Password -->
  <div class="form-group">
    <label for="password">Password</label> <!-- Changed 'userName' to 'password' -->
    <input type="password" id="password" class="form-control" formControlName="password" placeholder="Password"> <!-- Changed 'userName' to 'password' -->
    <div class="text-danger" *ngIf="form.controls['password'].touched && form.controls['password'].invalid"> <!-- Changed 'userName' to 'password' -->
      <span *ngIf="form.controls['password'].errors?.['required']">Password is required.</span>
      <span *ngIf="form.controls['password'].errors?.['minlength']">Password must be at least 6 characters long.</span>
    </div>
  </div>

  <!-- Location Info -->
  <div class="form-row">
    <div class="form-group col-md-6">
      <label for="city">City</label>
      <input type="text" id="city" class="form-control" formControlName="city" placeholder="City">
    </div>
    <div class="form-group col-md-4">
      <label for="state">County</label>
      <input type="text" id="state" class="form-control" formControlName="state" placeholder="County">
    </div>
  </div>
  <div class="form-group form-check">
    <label class="form-check-label" for="isAgree">I agree to the Terms and Conditions</label>
    <input type="checkbox" id="isAgree" class="form-check-input" formControlName="isAgree">
  </div>
  <button type="submit" class="btn btn-primary w-100" [disabled]="!form.valid" style="margin-left: 180px; top:20px; width: auto;">Get Started</button>
</form>
