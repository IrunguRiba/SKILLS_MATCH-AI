<main class="recover-container">
  <h2 class="fade-in">Recover Password</h2>

  <div class="form-box slide-up">
    <div class="email-group">
      <input
        type="email"
        placeholder="Email Address"
        class="input-field"
        formControlName="emailAddress"
      />
      <button type="button" class="send-btn">Send</button>
    </div>

    <div
      *ngIf="form.controls['emailAddress'].touched && form.controls['emailAddress'].invalid"
      class="text-danger"
    >
      <span *ngIf="form.controls['emailAddress'].errors?.['required']">Email cannot be empty</span>
      <span *ngIf="form.controls['emailAddress'].errors?.['email']">Enter a valid email</span>
    </div>

    <div class="code-box fade-in-delayed">
      <input type="text" maxlength="1" class="digit-box" />
      <input type="text" maxlength="1" class="digit-box" />
      <input type="text" maxlength="1" class="digit-box" />
      <input type="text" maxlength="1" class="digit-box" />
      <input type="text" maxlength="1" class="digit-box" />
      <input type="text" maxlength="1" class="digit-box" />
    </div>

    <button
  type="button"
  class="submit-btn bounce-in"
  [disabled]="!form.valid"
  routerLink="/sign-in"
>
  Sign In
</button>
    <h4 class="success-message fade-in-late">Your Password has Been Sent to your Email</h4>
  </div>
</main>
